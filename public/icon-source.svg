<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Squircle background — iOS will mask this further; Android adaptive
       icons add a pad so we keep ~12% margin in the maskable export. -->
  <rect width="512" height="512" rx="96" fill="#050505"/>

  <!-- Italic 'J' built from primitives so rendering doesn't depend on
       any installed font in the build environment. -->
  <g fill="#CCFF00"
     transform="translate(256 256) skewX(-9) translate(-256 -256)">
    <!-- Top crossbar -->
    <rect x="160" y="115" width="245" height="58" rx="6"/>

    <!-- Vertical stem -->
    <rect x="278" y="115" width="62" height="232"/>

    <!-- Bottom curl: semi-arc stroked to match stem width, rounded ends -->
    <path d="M 340 320 A 110 110 0 0 1 120 320"
          stroke="#CCFF00" stroke-width="62" stroke-linecap="round" fill="none"/>
  </g>
</svg>
